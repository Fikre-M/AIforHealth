services:
  - type: web
    name: aiforhealth-backend
    # env: node           # Node.js native build (default)
    # To deploy via Docker instead, comment out the two lines above and uncomment below:
    env: docker
    dockerfilePath: ./backend/Dockerfile
    region: oregon
    plan: free
    # buildCommand and startCommand are used for env: node only
    # buildCommand: cd backend && npm install && npm run build
    # startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: https://ai4health.netlify.app
      - key: SEED_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: FRONTEND_URL
        value: https://ai4health.netlify.app
